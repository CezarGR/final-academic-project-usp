global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "transaction-api"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["app:8080"]
  - job_name: 'cadvisor'
    static_configs:
      - targets: [ 'cadvisor:8080' ]
  - job_name: 'node'
    static_configs:
      - targets: ['nodeexporter:9100']