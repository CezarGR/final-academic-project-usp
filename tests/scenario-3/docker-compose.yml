services:
  app:
    build:
      ../../application/
    container_name: transaction-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      - mongo
    networks:
      - monitoring

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          cpus: "5.0"
          memory: 512M
    networks:
      - monitoring

  mongodb_exporter:
    image: percona/mongodb_exporter:0.42
    container_name: mongodb_exporter
    command:
      - '--mongodb.uri=mongodb://mongo:27017'
    depends_on:
      - mongo
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_tsdb:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - app
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - ../../monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8081:8080"
    networks:
      - monitoring

volumes:
  mongo_data:
  prometheus_tsdb:
    name: ${PROMETHEUS_DATA_VOLUME_NAME}
    external: true

networks:
  monitoring:
    driver: bridge
