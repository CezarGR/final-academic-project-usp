# Reabre Prometheus (TSDB já gravado) + Grafana com as configs do repositório.
#
# Uso (na pasta tests/):
#   docker volume ls | grep scenario_
#   PROMETHEUS_DATA_VOLUME_NAME=scenario_2_1_execution docker compose -f docker-compose.metrics-view.yml up -d
#   Abra http://localhost:3000 (admin/admin por padrão) e http://localhost:9090
#
# Encerrar:
#   docker compose -f docker-compose.metrics-view.yml down
#
# Libere a porta 9090/3000 se ainda tiver stack de cenário no ar.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-metrics-view
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_tsdb:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-metrics-view
    environment:
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "3000:3000"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

volumes:
  prometheus_tsdb:
    # Variável obrigatória; ex.: scenario_2_1_execution
    # name: "${PROMETHEUS_DATA_VOLUME_NAME:?PROMETHEUS_DATA_VOLUME_NAME_not_set}"
    name: "scenario_3_4_execution"
    external: true

networks:
  monitoring:
    driver: bridge
