spring.application.name=transaction-api

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGO_DB_URI}
spring.data.mongodb.auto-index-creation=${SPRING_DATA_MONGO_DB_AUTO_INDEX_CREATION}
spring.mvc.async.request-timeout=${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:3000}

# Limite opcional para /api/maintenance/timeout-test (0 = sem limite → 200 após o delay completo)
app.maintenance.timeout-test-delay-ms=5000
app.maintenance.timeout-test-limit-ms=0

# Server Configuration
server.port=${SERVER_PORT}
server.version=1.0.3

# Tomcat: registra MBeans para o Micrometer expor métricas nativas (threads, sessões, etc.)
# Sem isso, muitas métricas "tomcat.*" não aparecem no /actuator/prometheus
server.tomcat.mbeanregistry.enabled=true
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX}
server.tomcat.connection-timeout=${SERVER_TOMCAT_CONNECTION_TIMEOUT:3000}

# Actuator: /actuator/metrics = lista de métricas (JSON); /actuator/prometheus = scrape Prometheus
# No Spring Boot 1.x existia /metrics na raiz; a partir do 2.x tudo fica sob /actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.metrics.enabled=true

# Prometheus (Spring Boot 3.x: preferir esta chave; a antiga metrics.export também costuma funcionar)
management.prometheus.metrics.export.enabled=true
management.metrics.export.prometheus.enabled=true

# Histogramas / percentis para http.server.requests (latência HTTP)
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.9,0.95,0.99

management.metrics.enable.tomcat=true
management.metrics.enable.jvm=true